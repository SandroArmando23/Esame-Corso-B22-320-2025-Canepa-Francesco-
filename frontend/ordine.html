<!doctype html>
<html lang="it">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>TastyDelivery — Nuovo Ordine</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark fixed-top">
    <div class="container">
        <a class="navbar-brand" href="index.html">
            <img src="img/tasty-delivery.svg" class="logo" alt="Tasty Delivery">
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="mainNav">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link" href="index.html">Catalogo</a></li>
                <li class="nav-item"><a class="nav-link active" href="ordine.html">Nuovo Ordine</a></li>
            </ul>
        </div>
    </div>
</nav>

<!-- HERO -->
<header class="hero d-flex align-items-center text-center text-light" style="min-height: 40vh;">
    <div class="container">
        <h1 class="display-5 fw-bold">Nuovo Ordine</h1>
        <p class="lead">Scegli il ristorante e i piatti che preferisci.</p>
    </div>
</header>

<!-- FORM -->
<section class="container my-5">
    <div class="row justify-content-center">
        <div class="col-lg-7">
            <div class="card bg-dark border-secondary">
                <div class="card-body p-4">

                    <div class="mb-4">
                        <label class="form-label" for="cliente">Nome o ID Cliente</label>
                        <input type="text" class="form-control" id="cliente" placeholder="es. Mario Rossi oppure ID: 3">
                    </div>

                    <div class="mb-4">
                        <label class="form-label" for="ristorante">Ristorante</label>
                        <select class="form-select" id="ristorante">
                            <option value="" disabled selected>— Scegli un ristorante —</option>
                            <option value="bella-napoli">🍕 Bella Napoli (Pizzeria)</option>
                            <option value="sushi-zen">🍣 Sushi Zen (Giapponese)</option>
                            <option value="old-wild-west">🍔 Old Wild West (Hamburgeria)</option>
                            <option value="taj-mahal">🍛 Taj Mahal (Indiano)</option>
                            <option value="el-sombrero">🌮 El Sombrero (Messicano)</option>
                            <option value="vesuvio-express">🍕 Vesuvio Express (Pizzeria)</option>
                        </select>
                    </div>

                    <div class="mb-4">
                        <label class="form-label">Seleziona i piatti</label>

                        <p class="text-secondary small" id="piatti-hint">Scegli prima un ristorante per vedere il menu.</p>

                        <div class="piatti-menu" id="menu-bella-napoli">
                            <div class="form-check"><input class="form-check-input" type="checkbox" id="p1"><label class="form-check-label" for="p1">Pizza Margherita — <strong>€ 6,00</strong></label></div>
                            <div class="form-check"><input class="form-check-input" type="checkbox" id="p2"><label class="form-check-label" for="p2">Pizza Diavola — <strong>€ 7,50</strong></label></div>
                            <div class="form-check"><input class="form-check-input" type="checkbox" id="p3"><label class="form-check-label" for="p3">Calzone Ripieno — <strong>€ 8,00</strong></label></div>
                        </div>

                        <div class="piatti-menu" id="menu-sushi-zen">
                            <div class="form-check"><input class="form-check-input" type="checkbox" id="p4"><label class="form-check-label" for="p4">Sashimi Salmone (6pz) — <strong>€ 12,00</strong></label></div>
                            <div class="form-check"><input class="form-check-input" type="checkbox" id="p5"><label class="form-check-label" for="p5">Uramaki Tiger (8pz) — <strong>€ 14,00</strong></label></div>
                            <div class="form-check"><input class="form-check-input" type="checkbox" id="p6"><label class="form-check-label" for="p6">Edamame — <strong>€ 4,00</strong></label></div>
                        </div>

                        <div class="piatti-menu" id="menu-old-wild-west">
                            <div class="form-check"><input class="form-check-input" type="checkbox" id="p7"><label class="form-check-label" for="p7">BBQ Burger — <strong>€ 10,00</strong></label></div>
                            <div class="form-check"><input class="form-check-input" type="checkbox" id="p8"><label class="form-check-label" for="p8">Bacon Cheese Burger — <strong>€ 11,50</strong></label></div>
                            <div class="form-check"><input class="form-check-input" type="checkbox" id="p9"><label class="form-check-label" for="p9">Patatine Fritte — <strong>€ 4,00</strong></label></div>
                        </div>

                        <div class="piatti-menu" id="menu-taj-mahal">
                            <div class="form-check"><input class="form-check-input" type="checkbox" id="p10"><label class="form-check-label" for="p10">Chicken Tikka Masala — <strong>€ 13,00</strong></label></div>
                            <div class="form-check"><input class="form-check-input" type="checkbox" id="p11"><label class="form-check-label" for="p11">Naan al Formaggio — <strong>€ 3,50</strong></label></div>
                        </div>

                        <div class="piatti-menu" id="menu-el-sombrero">
                            <div class="form-check"><input class="form-check-input" type="checkbox" id="p12"><label class="form-check-label" for="p12">Tacos di Manzo — <strong>€ 9,00</strong></label></div>
                            <div class="form-check"><input class="form-check-input" type="checkbox" id="p13"><label class="form-check-label" for="p13">Burrito Piccante — <strong>€ 10,00</strong></label></div>
                        </div>

                        <div class="piatti-menu" id="menu-vesuvio-express">
                            <div class="form-check"><input class="form-check-input" type="checkbox" id="p14"><label class="form-check-label" for="p14">Pizza Quattro Formaggi — <strong>€ 8,50</strong></label></div>
                            <div class="form-check"><input class="form-check-input" type="checkbox" id="p15"><label class="form-check-label" for="p15">Pizza Capricciosa — <strong>€ 9,00</strong></label></div>
                        </div>
                    </div>

                    <div class="d-grid">
                        <button class="btn btn-primary btn-lg fw-bold" id="btn-invia">Invia Ordine</button>
                    </div>

                    <div class="alert alert-success mt-3 d-none" id="alert-ok">
                        ✅ Ordine inviato con successo! Stato: <strong>In preparazione</strong>
                    </div>

                </div>
            </div>
        </div>
    </div>
</section>

<!-- FOOTER -->
<footer class="bg-dark text-center text-secondary py-4">
    <div class="container">
        <p class="mb-1">© 2025 TastyDelivery — Via Roma 42, Torino</p>
        <p class="mb-0">📧 info@tastydelivery.it &nbsp;·&nbsp; 📞 +39 011 000 0000</p>
    </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
    const menuIds = {
        'bella-napoli':    'menu-bella-napoli',
        'sushi-zen':       'menu-sushi-zen',
        'old-wild-west':   'menu-old-wild-west',
        'taj-mahal':       'menu-taj-mahal',
        'el-sombrero':     'menu-el-sombrero',
        'vesuvio-express': 'menu-vesuvio-express'
    };

    document.getElementById('ristorante').addEventListener('change', function() {
        document.querySelectorAll('.piatti-menu').forEach(m => {
            m.classList.remove('show');
            m.querySelectorAll('input').forEach(c => c.checked = false);
        });
        const menu = document.getElementById(menuIds[this.value]);
        if (menu) {
            menu.classList.add('show');
            document.getElementById('piatti-hint').classList.add('d-none');
        }
    });

    document.getElementById('btn-invia').addEventListener('click', function() {
        document.getElementById('alert-ok').classList.remove('d-none');
    });
</script>
</body>
</html>
